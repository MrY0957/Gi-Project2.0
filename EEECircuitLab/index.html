<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEE Circuit Hub</title>
  <link rel="stylesheet" href="EEE.css">
</head>
<body>
  <header>
    <h1>EEE Circuit Hub</h1>
    <p>Explore ICs, Logic Gates & Circuit Diagrams</p>
  </header>

  <nav>
    <a href="#ic">ICs</a>
    <a href="#logic">Logic Gates</a>
    <a href="#projects">Projects</a>
  </nav>

  <!-- Logic Gates section -->
  <section id="logic">
    <h2>Logic Gates</h2>
    <div class="card">
  <h3>AND Gate Simulation</h3>
  <label>Input A: 
    <input type="checkbox" id="inputA" class="switch">
    <span class="switch-label">OFF</span>
  </label>
  <label>Input B: 
    <input type="checkbox" id="inputB" class="switch">
    <span class="switch-label">OFF</span>
  </label>
  <p>Output: <span id="output">0</span></p>
 </div>
    <div class="card">
      <h3>OR Gate Simulation</h3>
      <label>Input A: 
        <input type="checkbox" id="orInputA" class="switch">
        <span class="switch-label">OFF</span>
      </label>
      <label>Input B: 
        <input type="checkbox" id="orInputB" class="switch">
        <span class="switch-label">OFF</span>
      </label>
      <p>Output: <span id="orOutput">0</span></p>
    </div>
    <div class="card">
      <h3>NOT Gate Simulation</h3>
      <label>Input: 
        <input type="checkbox" id="notInput" class="switch">
        <span class="switch-label">OFF</span>
      </label>
      <p>Output: <span id="notOutput">0</span></p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 EEE Circuit Hub | Designed for Students</p>
  </footer>

  <!-- JS আলাদা ফাইল থেকে লোড -->
  <script src="EEE.js"></script>
</body>
</html>
